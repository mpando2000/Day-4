version: "3.9"
services:
  redis:
    image: redis:7-alpine
    container_name: gateway-lab-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  claim-service:
    build:
      context: .
      args:
        MODULE: claim-service
    container_name: gateway-lab-claim
    ports:
      - "18081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  member-service:
    build:
      context: .
      args:
        MODULE: member-service
    container_name: gateway-lab-member
    ports:
      - "18082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  card-service:
    build:
      context: .
      args:
        MODULE: card-service
    container_name: gateway-lab-card
    ports:
      - "18083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      args:
        MODULE: api-gateway
    container_name: gateway-lab-gateway
    ports:
      - "18080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      redis:
        condition: service_healthy
      claim-service:
        condition: service_healthy
      member-service:
        condition: service_healthy
      card-service:
        condition: service_healthy
